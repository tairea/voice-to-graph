version: "3.8"

services:
  pharos:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pharos
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      GUN_RELAY_URL: "http://gun-relay:8765/gun"
      PHAROS_NAME: "${PHAROS_NAME:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - pharos-data:/app/data
      - pharos-state:/app/pharos-data
    depends_on:
      - gun-relay
    restart: unless-stopped

  gun-relay:
    build:
      context: ./gun-relay
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - gun-data:/opt/gun-relay/data
    restart: unless-stopped

volumes:
  pharos-data:
  pharos-state:
  gun-data:
